# ncat configuration file — copy to config.toml and customize.

[server]
# Bind address for the WebSocket server.
# "0.0.0.0" listens on all interfaces (IPv4+IPv6); required for SSH tunnels.
host = "0.0.0.0"
# Port that NapCatQQ connects to (must match NapCatQQ's reverse WS config).
port = 8282

[agent]
# Path or name of the ACP agent executable.
command = "claude"
# Arguments to pass to the agent (e.g. ["--experimental-acp"] for gemini).
args = []
# Root directory under which all workspaces are created.
workspace_root = "/workspace"
# Default workspace name used when /new is sent without an argument.
default_workspace = "default"
# Optional env var name used to pass a JSON object with extra log context
# to the agent wrapper. ncat only emits the JSON object and does not define
# how the wrapper stores it.
log_extra_context_env_var = "SUZU_WRAPPER_EXTRA_LOG"
# Extra environment variables passed to the agent process.
# These are merged with the system environment (and override on conflict).
# Useful for API keys, proxy settings, etc.
[agent.env]
# GEMINI_API_KEY = "your-api-key-here"
# ANTHROPIC_API_KEY = "your-api-key-here"
# HTTPS_PROXY = "http://127.0.0.1:7890"

# Example stdio MCP server.
# [[mcp]]
# name = "example_mcp"
# transport = "stdio"
# command = "python"
# args = ["-m", "example_mcp_server"]
# [mcp.env]
# EXAMPLE_API_KEY = "your-api-key-here"

# [[mcp]]
# name = "filesystem"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/home/user/files"]

# BSP server for background session management
[bsp_server]
enabled = true
host = "127.0.0.1"
port = 8766

# MQTT broker for session notifications
[mqtt]
enabled = true
host = "suzu-mosquitto"
port = 1883
topic_prefix = "suzu"
client_id = "ncat"

[ux]
# Seconds before sending "AI is thinking" notification (0 to disable).
thinking_notify_seconds = 10
# Seconds before sending "AI is thinking too long, use /stop" notification (0 to disable).
thinking_long_notify_seconds = 30
# Max text characters per outbound QQ message before ncat splits a long reply.
# Set to 0 to disable pre-splitting.
max_reply_text_length = 5000
# Timeout (seconds) for downloading images from NapCat-provided URLs.
image_download_timeout = 15.0
# Every image is normalized before being sent to the agent. The processed image
# must fit within this inline budget. Opaque images are transcoded to JPEG;
# transparent images try optimized PNG first, then fall back to WebP.
max_inline_image_mb = 2

[file_ingress]
# Enable private-chat file receipt into per-workspace `.qqfiles/` directories.
enabled = true
# Directory created under each chat workspace for incoming QQ files.
inbox_dirname = ".qqfiles"
# Timeout (seconds) for downloading private files from NapCat URLs.
download_timeout = 30.0
# Buffered file-only or image-only inputs expire after this many seconds.
pending_ttl_seconds = 1800.0
# Optional file size cap in MiB. Comment out or leave unset for no limit.
# max_file_size_mb = 50

[logging]
# Console output level: DEBUG / INFO / WARNING / ERROR.
# The log file always captures DEBUG regardless of this setting.
level = "INFO"
# Directory for log files (created automatically) (relative to project root).
dir = "data/logs"
# Number of days to keep daily-rotated log files.
keep_days = 30
# Total log size cap in MB. On startup, oldest files are deleted if exceeded.
max_total_mb = 100
