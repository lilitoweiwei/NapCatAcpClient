# ncat configuration file

[server]
host = "0.0.0.0"
port = 8282

[agent]
# Command to start the ACP agent directly
command = "/bin/bash"
# Arguments for the agent command
args = ["/app/agents/run_qwen_acp.sh"]
# Working directory for the agent process.
cwd = "/app/agents"

# NapCat MCP (STDIO): Currently shelved, commented out to prevent errors
# [[mcp]]
# name = "napcat_mcp"
# transport = "stdio"
# command = "uv"
# args = ["run", "--project", "/app/NapCatMCP", "napcat-mcp", "--transport", "stdio"]

# BSP server for background session management
[bsp_server]
enabled = true
host = "127.0.0.1"
port = 8766

# MQTT broker for session notifications
[mqtt]
enabled = true
host = "mqtt-broker"
port = 1883
topic_prefix = "suzu"
client_id = "ncat"

[logging]
level = "DEBUG"
dir = "log"

[ux]
# Seconds before notifying the user that the AI is thinking.
thinking_notify_seconds = 10
# Seconds before notifying the user that the AI is taking a long time to think.
thinking_long_notify_seconds = 30
# Timeout for downloading images.
image_download_timeout = 15.0
